services:
  api:
    build: .
    container_name: order_inventory_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/order_inventory
      SERVER_ADDR: ${SERVER_ADDR}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      RUST_LOG: tower_http=info
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: order_inventory_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_inventory
    ports:
      - "5432:5432"
    volumes:
      - order_inventory_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  order_inventory_data: